name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint and test (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate example config JSON
        shell: pwsh
        run: |
          Get-Content -Path .\PatchManager.config.example.json -Raw | ConvertFrom-Json | Out-Null
          Write-Host 'Example config parses as valid JSON.'

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module PSScriptAnalyzer -Force -Scope CurrentUser

      - name: PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Settings .\PSScriptAnalyzerSettings.psd1
          $results | Format-Table RuleName, Severity, ScriptName, Line, Message -AutoSize | Out-String -Width 200 | Write-Host
          $errors = @($results | Where-Object Severity -eq 'Error')
          if ($errors.Count -gt 0) {
            throw "PSScriptAnalyzer found $($errors.Count) error(s)."
          }

      - name: Run static and fixture tests (Windows PowerShell 5.1)
        shell: powershell
        run: .\Tests\Invoke-PatchManager.Static.Tests.ps1

      - name: Run static and fixture tests (PowerShell 7)
        shell: pwsh
        run: .\Tests\Invoke-PatchManager.Static.Tests.ps1
